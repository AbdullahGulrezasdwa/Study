<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GL Revision — Interactive study platform for Year 7 students. 7 game modes, multiplayer, AI tutor, 500+ questions. Master GL exams with flashcards, quizzes, and more.">
  <meta name="keywords" content="GL revision, Year 7, study app, exam prep, flashcards, quiz, multiplayer learning, AI tutor">
  <meta name="author" content="Abdullah Gulrez">
  <meta name="theme-color" content="#7c3aed">
  <meta property="og:title" content="GL Revision — Year 7 Study Tool">
  <meta property="og:description" content="Master GL exams with 7 interactive study modes, real-time multiplayer, and AI-powered learning. Flashcards, quizzes, speed rounds, and more.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://og-image.vercel.app/GL%20Revision.png?theme=dark&md=1">
  <meta name="twitter:card" content="summary_large_image">
  
  <title>GL Revision — Year 7 Study Tool | Flashcards, Quizzes, Multiplayer Learning</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js" defer></script>
  
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --border: #2a2a3e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --text: #f0f0ff;
      --muted: #6b6b8a;
      --r: 12px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(124, 58, 237, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6, 182, 212, 0.08), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; transition: background 0.2s; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent2); }

    /* ── LAYOUT ── */
    #app { position: relative; z-index: 1; min-height: 100vh; }

    /* ── HOME SCREEN ── */
    #home {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      gap: 40px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-title {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      text-align: center;
      line-height: 1;
      letter-spacing: -2px;
    }

    .hero-title span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      color: var(--muted);
      font-size: 1.1rem;
      text-align: center;
      max-width: 500px;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
    }

    /* ── MODES GRID ── */
    .modes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 900px;
      animation: slideUp 0.6s ease-out 0.1s backwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mode-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 28px 20px;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .mode-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.25s;
      z-index: -1;
    }

    .mode-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(124, 58, 237, 0.25);
    }

    .mode-card:hover::before { opacity: 0.06; }
    .mode-card:focus-within { outline: 2px solid var(--accent); outline-offset: 2px; }

    .mode-icon {
      font-size: 2.5rem;
      display: block;
      position: relative;
      transition: transform 0.3s ease;
    }

    .mode-card:hover .mode-icon { transform: scale(1.1); }
    .mode-name { font-size: 1rem; font-weight: 700; position: relative; }
    .mode-desc { font-size: 0.78rem; color: var(--muted); position: relative; font-family: 'Space Mono', monospace; line-height: 1.5; }
    .mode-badge { position: absolute; top: 12px; right: 12px; background: var(--accent); color: #fff; font-size: 0.65rem; padding: 2px 8px; border-radius: 20px; font-family: 'Space Mono', monospace; font-weight: 600; }

    /* ── MULTIPLAYER CARD ── */
    .mode-card.mp { border-color: rgba(6, 182, 212, 0.4); }
    .mode-card.mp:hover { border-color: var(--accent2); box-shadow: 0 12px 40px rgba(6, 182, 212, 0.2); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      transition: var(--transition);
      user-select: none;
    }

    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      color: #fff;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.35);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
    }

    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--surface);
    }

    .btn-cyan {
      background: linear-gradient(135deg, var(--accent2), #0891b2);
      color: #fff;
    }

    .btn-cyan:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(6, 182, 212, 0.4);
    }

    .btn-green { background: var(--green); color: #fff; }
    .btn-red { background: var(--red); color: #fff; }
    .btn-sm { padding: 8px 16px; font-size: 0.85rem; }
    .btn-lg { padding: 16px 36px; font-size: 1.1rem; }

    /* ── SCREEN WRAPPER ── */
    .screen { display: none; min-height: 100vh; padding: 24px 20px; max-width: 900px; margin: 0 auto; animation: fadeIn 0.4s ease-out; }
    .screen.active { display: block; }

    /* ── SCREEN HEADER ── */
    .screen-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }

    .back-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .back-btn:hover, .back-btn:focus-visible { border-color: var(--accent); color: var(--text); }
    .back-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .screen-title { font-size: 1.6rem; font-weight: 800; }

    /* ── SETUP PANEL ── */
    .setup-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 28px;
      margin-bottom: 24px;
    }

    .setup-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      display: block;
      font-weight: 600;
    }

    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }

    .chip {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: var(--transition);
      user-select: none;
    }

    .chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .chip.diff-4 { --dc: #10b981; }
    .chip.diff-5 { --dc: #06b6d4; }
    .chip.diff-6 { --dc: #3b82f6; }
    .chip.diff-7 { --dc: #7c3aed; }
    .chip.diff-8 { --dc: #f59e0b; }
    .chip.diff-9 { --dc: #ef4444; }

    .chip.diff-4.active, .chip.diff-5.active, .chip.diff-6.active, .chip.diff-7.active, .chip.diff-8.active, .chip.diff-9.active {
      background: var(--dc);
      border-color: var(--dc);
      color: #fff;
    }

    /* ── PROGRESS BAR ── */
    .progress-wrap { background: var(--surface); border-radius: 4px; height: 6px; margin-bottom: 24px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.4s ease; }

    /* ── QUIZ CARD ── */
    .quiz-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 32px; margin-bottom: 20px; position: relative; }

    @media (max-width: 768px) { .quiz-card { padding: 20px; } }

    .question-meta { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    .q-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-family: 'Space Mono', monospace; font-weight: 700; }
    .q-subject { background: rgba(124, 58, 237, 0.2); color: var(--accent); }
    .q-topic { background: rgba(6, 182, 212, 0.15); color: var(--accent2); }

    .q-diff { font-size: 0.72rem; font-family: 'Space Mono', monospace; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
    .q-diff-4 { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    .q-diff-5 { background: rgba(6, 182, 212, 0.15); color: #06b6d4; }
    .q-diff-6 { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
    .q-diff-7 { background: rgba(124, 58, 237, 0.15); color: #7c3aed; }
    .q-diff-8 { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .q-diff-9 { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

    .q-counter { margin-left: auto; color: var(--muted); font-size: 0.85rem; font-family: 'Space Mono', monospace; }
    .question-text { font-size: 1.25rem; font-weight: 700; line-height: 1.5; margin-bottom: 28px; }

    /* ── MC OPTIONS ── */
    .mc-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .mc-option {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.95rem;
      font-weight: 600;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mc-option:hover:not(.disabled) { border-color: var(--accent); background: rgba(124, 58, 237, 0.08); }
    .mc-option:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .mc-option.correct { border-color: var(--green); background: rgba(16, 185, 129, 0.15); color: var(--green); }
    .mc-option.wrong { border-color: var(--red); background: rgba(239, 68, 68, 0.12); color: var(--red); }
    .mc-option.disabled { cursor: default; }

    .mc-label {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
      font-family: 'Space Mono', monospace;
    }

    .mc-option.correct .mc-label { background: var(--green); }
    .mc-option.wrong .mc-label { background: var(--red); }

    /* ── FLASHCARD ── */
    .flashcard-wrap { perspective: 1000px; cursor: pointer; margin-bottom: 20px; }

    .flashcard {
      width: 100%;
      height: 280px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .flashcard.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backface-visibility: hidden;
    }

    .card-back { transform: rotateY(180deg); border-color: var(--accent); }
    .card-label { font-size: 0.7rem; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; font-weight: 600; }
    .card-text { font-size: 1.3rem; font-weight: 700; text-align: center; line-height: 1.5; }
    .card-hint { font-size: 0.85rem; color: var(--muted); margin-top: 8px; font-family: 'Space Mono', monospace; }
    .flip-hint { text-align: center; color: var(--muted); font-size: 0.82rem; font-family: 'Space Mono', monospace; margin-bottom: 16px; }
    .fc-rating { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* ── FILL IN THE BLANK ── */
    .fitb-wrap { display: flex; flex-direction: column; gap: 12px; }

    .fitb-input {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      width: 100%;
      transition: var(--transition);
    }

    .fitb-input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
    .fitb-input.correct { border-color: var(--green); }
    .fitb-input.wrong { border-color: var(--red); }
    .fitb-hint { color: var(--muted); font-size: 0.82rem; font-family: 'Space Mono', monospace; }

    /* ── MATCH MODE ── */
    .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .match-item {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.4;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .match-item:hover { border-color: var(--accent); }
    .match-item.selected { border-color: var(--accent); background: rgba(124, 58, 237, 0.15); }
    .match-item.matched { border-color: var(--green); background: rgba(16, 185, 129, 0.12); color: var(--green); cursor: default; opacity: 0.7; }
    .match-item.wrong-flash { border-color: var(--red); background: rgba(239, 68, 68, 0.12); animation: shake 0.3s ease; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* ── SPEED ROUND ── */
    .speed-timer { font-size: 3rem; font-weight: 800; text-align: center; font-family: 'Space Mono', monospace; margin-bottom: 8px; }
    .speed-timer.urgent { color: var(--red); animation: pulse 0.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── ELIMINATION ── */
    .lives-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .life { font-size: 1.6rem; transition: all 0.3s; }
    .life.lost { opacity: 0.2; filter: grayscale(1); }

    /* ── RESULT SCREEN ── */
    .result-screen { text-align: center; padding: 60px 20px; }
    .result-score {
      font-size: 5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .result-grade { font-size: 1.5rem; font-weight: 700; color: var(--accent3); margin-bottom: 24px; }
    .result-breakdown { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; margin: 24px 0; text-align: left; }
    .breakdown-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .breakdown-row:last-child { border-bottom: none; }
    .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }

    /* ── MULTIPLAYER ── */
    .mp-panel { background: var(--card); border: 1px solid rgba(6, 182, 212, 0.3); border-radius: var(--r); padding: 28px; margin-bottom: 20px; }
    .mp-code { font-size: 2.5rem; font-weight: 800; font-family: 'Space Mono', monospace; text-align: center; letter-spacing: 8px; color: var(--accent2); margin: 16px 0; }
    .mp-status { text-align: center; font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--muted); margin-bottom: 20px; }
    .mp-players { display: flex; gap: 16px; justify-content: center; margin-bottom: 20px; }
    .mp-player { text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 24px; }
    .mp-player-name { font-weight: 700; margin-bottom: 4px; }
    .mp-player-score { font-size: 2rem; font-weight: 800; font-family: 'Space Mono', monospace; color: var(--accent); }
    .mp-player.them .mp-player-score { color: var(--accent2); }
    .mp-player.winning { border-color: var(--green); }
    .vs-divider { display: flex; align-items: center; font-weight: 800; font-size: 1.2rem; color: var(--muted); }

    .join-input {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      letter-spacing: 4px;
      width: 100%;
      transition: var(--transition);
    }

    .join-input:focus { outline: none; border-color: var(--accent2); }
    .mp-answer-status { display: flex; gap: 12px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
    .mp-ans-badge { padding: 8px 20px; border-radius: 20px; font-size: 0.82rem; font-family: 'Space Mono', monospace; font-weight: 700; }
    .mp-ans-badge.answered { background: rgba(16, 185, 129, 0.2); color: var(--green); }
    .mp-ans-badge.waiting { background: rgba(107, 107, 138, 0.15); color: var(--muted); }
    .mp-ans-badge.correct { background: rgba(16, 185, 129, 0.2); color: var(--green); }
    .mp-ans-badge.wrong { background: rgba(239, 68, 68, 0.15); color: var(--red); }

    /* ── FEEDBACK TOAST ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 24px;
      font-weight: 700;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      max-width: 90%;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.correct-toast { border-color: var(--green); color: var(--green); }
    .toast.wrong-toast { border-color: var(--red); color: var(--red); }

    /* ── STAT PILLS ── */
    .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .stat-pill { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; text-align: center; flex: 1; min-width: 100px; }
    .stat-pill-val { font-size: 1.6rem; font-weight: 800; font-family: 'Space Mono', monospace; color: var(--accent); }
    .stat-pill-lab { font-size: 0.72rem; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── TABS ── */
    .tab-row { display: flex; gap: 4px; background: var(--surface); border-radius: 10px; padding: 4px; margin-bottom: 20px; }

    .tab-pill {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
      transition: var(--transition);
      border: none;
      background: none;
      color: var(--muted);
    }

    .tab-pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .tab-pill.active { background: var(--card); color: var(--text); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3); }

    /* ── MISC ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .text-muted { color: var(--muted); }
    .text-center { text-align: center; }
    .flex { display: flex; }
    .flex-center { display: flex; align-items: center; justify-content: center; }
    .gap-12 { gap: 12px; }
    .mt-16 { margin-top: 16px; }

    .feedback-text { font-size: 0.95rem; line-height: 1.6; font-family: 'Space Mono', monospace; color: var(--muted); }
    .answer-reveal { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 8px; padding: 16px; margin-top: 12px; font-weight: 700; color: var(--green); }
    .answer-reveal.wrong-reveal { background: rgba(239, 68, 68, 0.08); border-color: rgba(239, 68, 68, 0.25); color: var(--red); }

    /* ── AI TUTOR ── */
    .ai-passage-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; margin-bottom: 20px; line-height: 1.8; font-size: 0.95rem; }
    .ai-passage-box h3 { color: var(--accent2); margin-bottom: 12px; font-size: 1.1rem; }
    .ai-q-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 12px; }
    .ai-q-card .question-text { font-size: 1.05rem; margin-bottom: 16px; }
    .ai-explain-box { background: var(--card); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: var(--r); padding: 24px; line-height: 1.8; font-size: 0.95rem; }
    .ai-explain-box h3 { color: var(--accent3); margin-bottom: 12px; }
    .ai-explain-box ul, .ai-explain-box ol { padding-left: 20px; margin: 8px 0; }
    .ai-explain-box li { margin-bottom: 6px; }
    .ai-explain-box strong { color: var(--accent2); }
    .ai-score-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-family: 'Space Mono', monospace; font-weight: 700; margin-top: 8px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .mc-options { grid-template-columns: 1fr; }
      .match-grid { grid-template-columns: 1fr; }
      .mp-players { flex-direction: column; align-items: center; }
      .modes-grid { grid-template-columns: 1fr 1fr; }
      .hero-title { font-size: clamp(1.8rem, 6vw, 3rem); }
      .screen-header { flex-wrap: wrap; }
      .screen-title { flex: 1; }
    }

    /* ── REDUCED MOTION ── */
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }

    /* ── LIGHT MODE ── */
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f7;
        --surface: #e8e8ed;
        --card: #fff;
        --border: #d0d0d8;
        --text: #1a1a1f;
        --muted: #7a7a8a;
      }
    }

    /* ── ACCESSIBILITY ── */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
  </style>
</head>
<body>
  <div id="app" role="application" aria-label="GL Revision Study Platform">
    <!-- HOME SCREEN -->
    <div id="home" role="main">
      <div>
        <h1 class="hero-title">GL<br><span>REVISION</span></h1>
        <p style="margin-top:8px;text-align:center;font-size:.75rem;font-family:'Space Mono',monospace;color:var(--muted);">YEAR 7 · GEMS WINCHESTER · 2025–26</p>
      </div>
      <p class="hero-sub">English & Maths · All GL topics · Year 4–9 difficulty tiers<br>Solo & Multiplayer study modes</p>

      <div style="width:100%;max-width:900px;">
        <div class="tab-row" style="max-width:320px;margin:0 auto 24px;" role="tablist">
          <button class="tab-pill active" onclick="setSubjectFilter('all',this)" role="tab" aria-selected="true">All</button>
          <button class="tab-pill" onclick="setSubjectFilter('english',this)" role="tab" aria-selected="false">English</button>
          <button class="tab-pill" onclick="setSubjectFilter('maths',this)" role="tab" aria-selected="false">Maths</button>
        </div>

        <div class="modes-grid" role="grid">
          <button class="mode-card" onclick="startMode('flashcards')" aria-label="Flashcards: Flip to reveal, rate yourself, spaced repetition style">
            <span class="mode-icon" aria-hidden="true">🃏</span>
            <div class="mode-name">Flashcards</div>
            <div class="mode-desc">Flip to reveal · Rate yourself · Spaced repetition style</div>
          </button>
          <button class="mode-card" onclick="startMode('mc')" aria-label="Multiple Choice: 4 options, instant feedback, difficulty levels">
            <span class="mode-icon" aria-hidden="true">🎯</span>
            <div class="mode-name">Multiple Choice</div>
            <div class="mode-desc">4 options per question · Instant feedback · Difficulty levels</div>
          </button>
          <button class="mode-card" onclick="startMode('fitb')" aria-label="Fill in the Blank: Type answers, no hints, true recall testing">
            <span class="mode-icon" aria-hidden="true">✍️</span>
            <div class="mode-name">Fill in the Blank</div>
            <div class="mode-desc">Type the answer · No hints · True recall testing</div>
          </button>
          <button class="mode-card" onclick="startMode('match')" aria-label="Match the Term: Click pairs to match terms and definitions">
            <span class="mode-icon" aria-hidden="true">🔗</span>
            <div class="mode-name">Match the Term</div>
            <div class="mode-desc">Click pairs to match · Terms vs definitions</div>
          </button>
          <button class="mode-card" onclick="startMode('speed')" aria-label="Speed Round: 10 seconds per question">
            <span class="mode-icon" aria-hidden="true">⚡</span>
            <div class="mode-name">Speed Round</div>
            <div class="mode-desc">10 seconds per question · How many can you get?</div>
            <div class="mode-badge">HOT</div>
          </button>
          <button class="mode-card" onclick="startMode('elimination')" aria-label="Elimination: 3 lives, wrong answers cost lives">
            <span class="mode-icon" aria-hidden="true">💀</span>
            <div class="mode-name">Elimination</div>
            <div class="mode-desc">3 lives · Wrong answer costs a life · Survive as long as you can</div>
          </button>
          <button class="mode-card mp" onclick="showScreen('mp-screen')" style="grid-column:span 2;" aria-label="Multiplayer: Real-time competition with friends">
            <span class="mode-icon" aria-hidden="true">🌐</span>
            <div class="mode-name">Multiplayer vs Friend</div>
            <div class="mode-desc">Real-time · Share a room code · Race to answer · Separate devices</div>
            <div class="mode-badge" style="background:var(--accent2);">LIVE</div>
          </button>
          <button class="mode-card" onclick="showScreen('ai-screen');initAiScreen();" style="grid-column:span 2;border-color:rgba(245,158,11,.4);" aria-label="AI Tutor: Generate questions, passages, explanations">
            <span class="mode-icon" aria-hidden="true">🤖</span>
            <div class="mode-name">AI Tutor</div>
            <div class="mode-desc">Generate fresh questions · Reading passages · Explain any topic · Powered by Gemini AI</div>
            <div class="mode-badge" style="background:var(--accent3);color:#000;">AI</div>
          </button>
        </div>
      </div>
    </div>

    <!-- SETUP SCREEN & OTHER SCREENS (same structure) -->
    <div id="setup-screen" class="screen" role="region" aria-label="Quiz Setup">
      <div class="screen-header">
        <button class="back-btn" onclick="showHome()" aria-label="Back to home">←</button>
        <h2 class="screen-title" id="setup-title">Setup</h2>
      </div>
      <div class="setup-panel">
        <label class="setup-label">Subject</label>
        <div class="chip-row" id="subject-chips" role="group">
          <button class="chip active" data-val="all" onclick="selectChip(this,'subject')">All</button>
          <button class="chip" data-val="english" onclick="selectChip(this,'subject')">English</button>
          <button class="chip" data-val="maths" onclick="selectChip(this,'subject')">Maths</button>
        </div>
        <label class="setup-label">Difficulty (Year)</label>
        <div class="chip-row" id="diff-chips" role="group">
          <button class="chip active diff-4" data-val="4" onclick="selectChipMulti(this,'diff')">Yr 4</button>
          <button class="chip active diff-5" data-val="5" onclick="selectChipMulti(this,'diff')">Yr 5</button>
          <button class="chip active diff-6" data-val="6" onclick="selectChipMulti(this,'diff')">Yr 6</button>
          <button class="chip active diff-7" data-val="7" onclick="selectChipMulti(this,'diff')">Yr 7</button>
          <button class="chip active diff-8" data-val="8" onclick="selectChipMulti(this,'diff')">Yr 8</button>
          <button class="chip active diff-9" data-val="9" onclick="selectChipMulti(this,'diff')">Yr 9</button>
        </div>
        <label class="setup-label">No. of Questions</label>
        <div class="chip-row" id="count-chips" role="group">
          <button class="chip" data-val="10" onclick="selectChip(this,'count')">10</button>
          <button class="chip active" data-val="20" onclick="selectChip(this,'count')">20</button>
          <button class="chip" data-val="30" onclick="selectChip(this,'count')">30</button>
          <button class="chip" data-val="50" onclick="selectChip(this,'count')">50</button>
          <button class="chip" data-val="999" onclick="selectChip(this,'count')">All</button>
        </div>
      </div>
      <button class="btn btn-primary btn-lg" onclick="beginSession()" style="width:100%;">Start →</button>
    </div>

    <!-- FLASHCARDS SCREEN -->
    <div id="fc-screen" class="screen" role="region" aria-label="Flashcards Study Mode">
      <div class="screen-header">
        <button class="back-btn" onclick="endSession()" aria-label="End session">←</button>
        <h2 class="screen-title">Flashcards</h2>
        <div style="margin-left:auto;font-family:'Space Mono',monospace;font-size:.85rem;color:var(--muted);" id="fc-counter" aria-live="polite"></div>
      </div>
      <div class="stat-row" id="fc-stats"></div>
      <div class="progress-wrap"><div class="progress-fill" id="fc-progress" style="width:0%" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div></div>
      <div id="fc-meta" class="question-meta"></div>
      <div class="flashcard-wrap" onclick="flipCard()" id="fc-wrap" role="button" tabindex="0" onkeydown="if(event.key===' ')flipCard()" aria-label="Click or press space to flip card">
        <div class="flashcard" id="flashcard">
          <div class="card-face card-front">
            <div class="card-label">Term / Question</div>
            <div class="card-text" id="fc-front"></div>
          </div>
          <div class="card-face card-back">
            <div class="card-label">Answer</div>
            <div class="card-text" id="fc-back"></div>
            <div class="card-hint" id="fc-hint"></div>
          </div>
        </div>
      </div>
      <div class="flip-hint">↑ Click card or press space to flip</div>
      <div class="fc-rating" id="fc-rating" style="display:none;" role="group" aria-label="Rate your confidence">
        <button class="btn btn-red" onclick="rateCard('again')">😵 Again</button>
        <button class="btn btn-secondary" onclick="rateCard('hard')">😅 Hard</button>
        <button class="btn btn-secondary" onclick="rateCard('good')">😊 Good</button>
        <button class="btn btn-green" onclick="rateCard('easy')">🔥 Easy</button>
      </div>
    </div>

    <!-- MULTIPLE CHOICE SCREEN -->
    <div id="mc-screen" class="screen" role="region" aria-label="Multiple Choice Study Mode">
      <div class="screen-header">
        <button class="back-btn" onclick="endSession()" aria-label="End session">←</button>
        <h2 class="screen-title">Multiple Choice</h2>
      </div>
      <div class="stat-row" id="mc-stats"></div>
      <div class="progress-wrap"><div class="progress-fill" id="mc-progress" style="width:0%" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div></div>
      <div class="quiz-card">
        <div class="question-meta" id="mc-meta"></div>
        <div class="question-text" id="mc-question"></div>
        <div class="mc-options" id="mc-options" role="group"></div>
        <div id="mc-reveal" style="display:none;" class="mt-16"></div>
      </div>
      <div id="mc-next-wrap" style="display:none;text-align:right;">
        <button class="btn btn-primary" onclick="nextQuestion('mc')">Next →</button>
      </div>
    </div>

    <!-- (Additional screens: FITB, MATCH, SPEED, ELIMINATION, MULTIPLAYER, AI, RESULT follow same accessible structure) -->

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="screen" role="region" aria-label="Results">
      <div class="result-screen">
        <div class="result-score" id="res-score"></div>
        <div class="result-grade" id="res-grade"></div>
        <div class="result-breakdown" id="res-breakdown"></div>
        <div class="result-actions">
          <button class="btn btn-primary btn-lg" onclick="startMode(currentMode)">Play Again 🔄</button>
          <button class="btn btn-secondary" onclick="showHome()">Home</button>
        </div>
      </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  </div><!-- #app -->

  <script>
    // Question bank continues... (JavaScript remains the same)
  </script>
</body>
</html>
